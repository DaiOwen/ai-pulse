<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的收藏 · AI 脉搏</title>
<meta name="description" content="查看和管理你的收藏内容">
<meta name="theme-color" content="#0a0a0f">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="manifest" href="manifest.json">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap');

  :root {
    --bg-primary: #0a0a0f;
    --bg-secondary: rgba(255,255,255,0.025);
    --bg-card: rgba(255,255,255,0.018);
    --border-subtle: rgba(255,255,255,0.06);
    --border-card: rgba(255,255,255,0.04);
    --text-primary: #f5f5f7;
    --text-secondary: #9898a0;
    --text-tertiary: #86868b;
    --accent-indigo: #6366f1;
    --accent-green: #22c55e;
    --accent-amber: #f59e0b;
    --accent-purple: #8b5cf6;
  }

  [data-theme="light"] {
    --bg-primary: #f5f5f7;
    --bg-secondary: rgba(0,0,0,0.02);
    --bg-card: rgba(0,0,0,0.015);
    --border-subtle: rgba(0,0,0,0.08);
    --border-card: rgba(0,0,0,0.06);
    --text-primary: #1d1d1f;
    --text-secondary: #6e6e73;
    --text-tertiary: #86868b;
  }

  [data-theme="light"] .orb { opacity: 0.08 !important; }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: linear-gradient(170deg, #06060d 0%, #0a0a1a 25%, #0d0a1f 50%, #080818 75%, #060610 100%);
    color: var(--text-primary);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    transition: background 0.5s ease;
  }

  [data-theme="light"] body {
    background: linear-gradient(170deg, #f5f5f7 0%, #fafafa 30%, #f0f0f5 60%, #f5f5f7 100%);
  }

  .bg-layer { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .orb {
    position: absolute; border-radius: 50%; filter: blur(140px);
    animation-timing-function: ease-in-out; animation-iteration-count: infinite;
    animation-direction: alternate;
  }
  .orb-1 { width:500px; height:500px; background:radial-gradient(circle, #6366f1 0%, #8b5cf6 40%, transparent 75%); top:-20%; right:-5%; opacity:0.07; animation:float1 25s infinite; }
  .orb-2 { width:350px; height:350px; background:radial-gradient(circle, #f59e0b 0%, #8b5cf6 30%, transparent 70%); bottom:-10%; left:-5%; opacity:0.05; animation:float2 30s infinite; }

  @keyframes float1 {
    0% { transform:translate(0,0) scale(1); } 50% { transform:translate(-60px,40px) scale(1.1); }
    100% { transform:translate(30px,-20px) scale(0.95); }
  }
  @keyframes float2 {
    0% { transform:translate(0,0) scale(1); } 50% { transform:translate(40px,-30px) scale(1.15); }
    100% { transform:translate(-20px,15px) scale(0.9); }
  }

  .content { position:relative; z-index:1; max-width:800px; margin:0 auto; padding:0 32px 80px; }

  .nav { display:flex; justify-content:space-between; align-items:center; padding:18px 0; border-bottom:0.5px solid var(--border-subtle); }
  .nav-brand { display:flex; align-items:center; gap:10px; }
  .nav-logo { width:34px; height:34px; border-radius:9px; background:linear-gradient(135deg, #6366f1, #8b5cf6); display:flex; align-items:center; justify-content:center; font-size:16px; }
  .nav-title { font-size:16px; font-weight:600; color:var(--text-primary); }
  .nav-link { font-size:13px; color:var(--text-tertiary); font-weight:500; cursor:pointer; transition:color 0.2s; text-decoration:none; }
  .nav-link:hover { color:var(--text-primary); }
  .toggle-track { width:38px; height:22px; background:rgba(99,102,241,0.25); border-radius:11px; border:0.5px solid rgba(99,102,241,0.35); position:relative; cursor:pointer; }
  .toggle-thumb { width:17px; height:17px; background:linear-gradient(135deg, #6366f1, #8b5cf6); border-radius:50%; position:absolute; top:2px; left:2px; box-shadow:0 1px 4px rgba(0,0,0,0.3); transition:transform 0.3s; }
  [data-theme="light"] .toggle-thumb { transform:translateX(16px); }
  .toggle-label { font-size:12px; color:var(--text-tertiary); }

  .hero { text-align:center; padding:50px 0 30px; }
  .hero-title { font-size:36px; font-weight:300; color:var(--text-primary); margin-bottom:6px; }
  .hero-sub { font-size:14px; color:var(--text-tertiary); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    background: var(--bg-secondary);
    border-radius: 16px;
    margin-top: 30px;
  }
  .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-title { font-size: 18px; color: var(--text-primary); margin-bottom: 8px; }
  .empty-desc { font-size: 14px; color: var(--text-tertiary); margin-bottom: 20px; }
  .empty-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: #fff;
    font-size: 14px;
    font-weight: 500;
    padding: 12px 24px;
    border-radius: 10px;
    text-decoration: none;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .empty-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(99,102,241,0.3); }

  .favorites-list { margin-top: 24px; }
  .fav-item {
    background: var(--bg-secondary);
    backdrop-filter: blur(16px);
    border: 0.5px solid var(--border-card);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
    transition: border-color 0.2s;
  }
  .fav-item:hover { border-color: rgba(255,255,255,0.12); }
  .fav-content { flex: 1; }
  .fav-title { font-size: 15px; font-weight: 500; color: var(--text-primary); line-height: 1.4; margin-bottom: 8px; }
  .fav-title a { color: inherit; text-decoration: none; }
  .fav-title a:hover { color: var(--accent-indigo); }
  .fav-meta { font-size: 12px; color: var(--text-tertiary); display: flex; gap: 12px; flex-wrap: wrap; }
  .fav-actions { display: flex; gap: 8px; }
  .fav-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 14px;
    padding: 6px 10px;
    border-radius: 6px;
    transition: all 0.2s;
    color: var(--text-tertiary);
  }
  .fav-btn:hover { background: rgba(255,255,255,0.06); }
  .fav-btn.delete:hover { color: #ef4444; background: rgba(239,68,68,0.1); }

  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin: 20px 0;
    padding: 16px;
    background: var(--bg-secondary);
    border-radius: 10px;
  }
  .stat-item { text-align: center; }
  .stat-num { font-size: 24px; font-weight: 600; color: var(--accent-amber); }
  .stat-label { font-size: 12px; color: var(--text-tertiary); }

  .clear-all {
    display: block;
    margin: 20px auto;
    padding: 10px 20px;
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.2);
    border-radius: 8px;
    color: #ef4444;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .clear-all:hover { background: rgba(239,68,68,0.2); }

  .footer { text-align:center; padding:32px 0 0; border-top:0.5px solid var(--border-subtle); }
  .footer-links { display:flex; justify-content:center; gap:20px; flex-wrap:wrap; }
  .footer-link { font-size:12px; color:var(--accent-indigo); text-decoration:none; }

  @media (max-width:768px) {
    .hero-title { font-size:28px; }
    .stats-bar { gap: 20px; }
    .fav-item { flex-direction: column; }
    .fav-actions { margin-top: 10px; justify-content: flex-end; }
  }
</style>
</head>
<body>

<div class="bg-layer">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
</div>

<div class="content">
  <nav class="nav">
    <div class="nav-brand">
      <div class="nav-logo">⚡</div>
      <a href="index.html" class="nav-title" style="text-decoration:none;color:inherit;">AI 脉搏</a>
    </div>
    <div style="display:flex;align-items:center;gap:20px;">
      <a href="index.html" class="nav-link">首页</a>
      <a href="about.html" class="nav-link">关于</a>
      <span class="toggle-label">暗</span>
      <div class="toggle-track" id="themeToggle"><div class="toggle-thumb"></div></div>
      <span class="toggle-label">亮</span>
    </div>
  </nav>

  <section class="hero">
    <h1 class="hero-title">⭐ 我的收藏</h1>
    <p class="hero-sub">管理你收藏的 AI 新闻</p>
  </section>

  <div class="stats-bar">
    <div class="stat-item">
      <div class="stat-num" id="favCount">0</div>
      <div class="stat-label">收藏总数</div>
    </div>
  </div>

  <div id="favoritesContainer">
    <!-- 收藏列表将通过 JS 渲染 -->
  </div>

  <footer class="footer">
    <div class="footer-links">
      <a href="index.html" class="footer-link">首页</a>
      <a href="feed.xml" class="footer-link">RSS订阅</a>
      <a href="https://github.com/DaiOwen/ai-pulse" class="footer-link" target="_blank" rel="noopener">GitHub</a>
    </div>
    <p style="font-size:11px;color:var(--text-tertiary);margin-top:12px;">© 2026 AI 脉搏 · 基于 Claude Code 构建</p>
  </footer>
</div>

<script>
  // 主题切换
  const html = document.documentElement;
  const themeToggle = document.getElementById('themeToggle');
  const savedTheme = localStorage.getItem('ai-pulse-theme');
  if (savedTheme === 'light') {
    html.setAttribute('data-theme', 'light');
  }
  themeToggle.addEventListener('click', function() {
    const isDark = html.getAttribute('data-theme') === 'dark';
    const newTheme = isDark ? 'light' : 'dark';
    html.setAttribute('data-theme', newTheme);
    localStorage.setItem('ai-pulse-theme', newTheme);
  });

  // 收藏功能
  function getFavorites() {
    return JSON.parse(localStorage.getItem('ai-pulse-favorites') || '{}');
  }

  function saveFavorites(favorites) {
    localStorage.setItem('ai-pulse-favorites', JSON.stringify(favorites));
    renderFavorites();
  }

  function formatDate(isoString) {
    const date = new Date(isoString);
    return date.toLocaleDateString('zh-CN') + ' ' + date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
  }

  function deleteFavorite(id) {
    const favorites = getFavorites();
    delete favorites[id];
    saveFavorites(favorites);
  }

  function clearAllFavorites() {
    if (confirm('确定要清空所有收藏吗？此操作不可撤销。')) {
      localStorage.removeItem('ai-pulse-favorites');
      renderFavorites();
    }
  }

  function renderFavorites() {
    const favorites = getFavorites();
    const container = document.getElementById('favoritesContainer');
    const countEl = document.getElementById('favCount');
    const count = Object.keys(favorites).length;

    countEl.textContent = count;

    if (count === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📭</div>
          <div class="empty-title">暂无收藏内容</div>
          <div class="empty-desc">在首页点击新闻旁边的 ☆ 按钮，即可添加收藏</div>
          <a href="index.html" class="empty-btn">前往首页 →</a>
        </div>
      `;
      return;
    }

    // 按收藏时间排序（最新的在前）
    const sortedFavorites = Object.entries(favorites)
      .sort((a, b) => new Date(b[1].savedAt) - new Date(a[1].savedAt));

    let html = '<div class="favorites-list">';
    sortedFavorites.forEach(([id, item]) => {
      html += `
        <div class="fav-item">
          <div class="fav-content">
            <div class="fav-title">
              <a href="${item.url}" target="_blank" rel="noopener">${item.title}</a>
            </div>
            <div class="fav-meta">
              <span>📰 ${item.source}</span>
              <span>📅 ${item.date}</span>
              <span>⏰ 收藏于 ${formatDate(item.savedAt)}</span>
            </div>
          </div>
          <div class="fav-actions">
            <a href="${item.url}" target="_blank" rel="noopener" class="fav-btn" title="阅读原文">🔗</a>
            <button class="fav-btn delete" onclick="deleteFavorite('${id}')" title="取消收藏">✕</button>
          </div>
        </div>
      `;
    });
    html += '</div>';
    html += `<button class="clear-all" onclick="clearAllFavorites()">清空所有收藏</button>`;

    container.innerHTML = html;
  }

  // 页面加载时渲染收藏列表
  renderFavorites();
</script>
</body>
</html>
